name: Update Scoop Bucket

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      project:
        description: "Project id from projects.json (optional)"
        required: false
        type: string
      version:
        description: "Version without leading v (optional)"
        required: false
        type: string
  repository_dispatch:
    types:
      - source-release-published

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Update manifests
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PROJECT: ${{ inputs.project }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          ./scripts/update-manifests.ps1